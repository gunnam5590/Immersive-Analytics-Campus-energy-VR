<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Immersive Campus Energy VR</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="status">Loading dataset...</div>

  <a-scene
    background="color:#0d131b"
    renderer="colorManagement:true; physicallyCorrectLights:true"
    webxr="optionalFeatures:local-floor,bounded-floor,hand-tracking"
    vr-mode-ui="enabled:true">

    <a-entity light="type:ambient; intensity:1.0; color:#d9e8f3"></a-entity>
    <a-entity light="type:directional; intensity:1.05; castShadow:true; color:#ffffff" position="-4 10 6"></a-entity>
    <a-entity light="type:directional; intensity:0.4; color:#78c8ff" position="5 4 -5"></a-entity>

    <a-plane position="0 0 -13" rotation="-90 0 0" width="50" height="50" color="#111b27" shadow="receive:true"></a-plane>

    <a-entity position="2.5 9.5 -13.5">
      <a-plane width="11" height="0.65" material="color:#0a1520; opacity:0.93; shader:flat"></a-plane>
      <a-text
        value="Immersive Campus Energy Visualization — Bangor University 2020"
        width="26"
        align="center"
        color="#ff4500"
        position="0 0 0.01">
      </a-text>
    </a-entity>

    <a-text
      id="sortLabel"
      value="Waiting for data..."
      width="10"
      align="center"
      color="#9cb3c4"
      position="0 0.5 0.5">
    </a-text>

    <a-entity id="metricPanel" position="0.5 0.6 4.5" rotation="-18 0 0">
      <a-plane width="10.5" height="0.8" position="0 -0.2 0.01" material="color:#3b3c36; opacity:0.95; shader:flat; side:double"></a-plane>
      
      <a-text value="Select Energy Metric's" width="9.5" align="center" color="#ffbf00" position="0 -0.70 1.12"></a-text>
      <a-entity id="metricButtonsRoot"></a-entity>
    </a-entity>

    <a-entity id="chartRoot"></a-entity>
    <a-entity id="labelsRoot"></a-entity>
    <a-entity id="axesRoot"></a-entity>

    <a-entity id="viewerRoot" visible="false">
      <a-plane width="5" height="2.5" material="color:#0d1622; opacity:0.97; shader:flat; side:double"></a-plane>
      <a-plane id="vpStrip" width="5" height="0.46" position="0 1.02 0.006" material="color:#1fc8db; opacity:1; shader:flat"></a-plane>
      <a-text value="Energy Information" width="7.3" align="center" color="#ff0000" position="0 0.99 0.014"></a-text>
      <a-text id="vpName" value="Select a bar" width="5.35" align="center" color="#ffffff" position="0 0.55 0.014"></a-text>
      <a-text id="vpMetric" value="Metric:" width="6.5" align="left" color="#dc143c" position="-1.65 0.18 0.014"></a-text>
      <a-text id="vpRef" value="Ref:" width="5" align="left" color="#c3d1db" position="-1.65 -0.07 0.014"></a-text>
      <a-text id="vpValue" value="Value:" width="5" align="left" color="#ff4500" position="-1.65 -0.32 0.014"></a-text>
      <a-text id="vpGia" value="GIA:" width="5" align="left" color="#ffbf00" position="-1.65 -0.57 0.014"></a-text>
      <a-text id="vpTotal" value="Total kWh:" width="5" align="left" color="#32cd32" position="-1.65 -0.82 0.014"></a-text>
    </a-entity>

    <a-entity id="rig" position="0 2.2 9.8" rotation="-8 0 0">
      <a-entity id="camera" camera look-controls="enabled:true" wasd-controls="acceleration:22">
        <a-entity cursor="rayOrigin:mouse" raycaster="objects:.interactive" position="0 0 -1"></a-entity>
      </a-entity>

      <a-entity laser-controls="hand: left" raycaster="objects: .interactive"></a-entity>
      <a-entity laser-controls="hand: right" raycaster="objects: .interactive"></a-entity>
    </a-entity>

  </a-scene>

  <script src="script.js"></script>
</body>
</html>
